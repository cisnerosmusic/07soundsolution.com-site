<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mensaje enviado · 07 Sound Solution</title>
<meta name="robots" content="noindex, follow" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@400&display=swap" />
<link rel="stylesheet" href="styles.css" />
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />

<style>
  .thanks-bg {
    position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(820px 480px at 50% 10%, rgba(240,180,41,.16), transparent 60%),
      radial-gradient(640px 460px at 82% 110%, rgba(232,118,26,.10), transparent 62%),
      var(--bg);
  }
  .thanks-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .thanks-card { max-width: 560px; }
  .thanks-badge {
    display: inline-grid; place-items: center;
    width: 96px; height: 96px; border-radius: 22px; margin-bottom: 1.1rem;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #1a1205;
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 3rem; line-height: 1;
  }
  .thanks-card h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 2rem;
    margin: 0 0 1rem;
  }
  .thanks-card p { color: var(--muted); margin: 0 0 0.4rem; }
  .thanks-card .sub { opacity: 0.7; font-size: 0.95rem; margin-bottom: 1.9rem; }
</style>
</head>
<body>

<div class="thanks-bg" aria-hidden="true"></div>

<div class="thanks-wrap">
  <div class="thanks-card">
    <div class="thanks-badge">07</div>
    <h1>Mensaje enviado</h1>
    <p>Gracias por escribir a 07 Sound Solution. Fito te responderá en breve.</p>
    <p class="sub">Message sent. Thanks for reaching out; Fito will get back to you shortly.</p>
    <a href="/" class="btn btn-primary">Volver al inicio · Back to home</a>
  </div>
</div>

</body>
</html>
